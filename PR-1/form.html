<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form action="" style="background-color: rgb(244, 255, 195);">
        <h2>Registration Form</h2>
        <table border="3">

            <tr>
                <th>First Name:</th>
                <td>
                    <input type="text" name="fname" placeholder="Enter your name">
                </td>
            </tr>

             <tr>
                <th>last Name:</th>
                <td>
                    <input type="text" name="fname" placeholder="Enter your name">
                </td>
            </tr>

             <tr>
                <th>contact no:</th>
                <td>
                    <input type="number" name="contact" placeholder="Enter contact no">
                </td>
            </tr>

            
             <tr>
                <th>landline no:</th>
                <td>
                    <input type="number" name="lline" placeholder="Enter landline no">
                </td>
            </tr>

             <tr>
                <th>Email:</th>
                <td>
                    <input type="text" name="Email" placeholder="Enter Email">
                </td>
            </tr>

             <tr>
                <th>password:</th>
                <td>
                    <input type="password" name="password" placeholder="Enter password">
                </td>
            </tr>

            <tr>
                <th>Date of birth:</th>
                <td>
                    <input type="date" name="dob" placeholder="Enter dob" required>
                </td>
            </tr>

            <tr>
                <th>Age:</th>
                <td>
                    <input type="number" name="Age" placeholder="Enter Age">
                </td>
            </tr>

             <tr>
                <th>Gender:</th>
                <td>
                    <input type="radio" name="Male">Male</input>
                    <input type="radio" name="Male">Female</input>
                </td>
            </tr>

             <tr>
                <th>Address:</th>
                <td>
                    <textarea name ="Address" placeholder="Enter Address"></textarea>
                </td>
            </tr>

            <tr>
                <th>city:</th>
                <td>
                    <select name="city" id="">
                        <option value="city">City</option>
                        <option value="Amreli">Amreli</option>
                        <option value="Amreli">rajkot</option>
                        <option value="Amreli">surat</option>
                        <option value="Amreli">dwarka</option>
                    </select>
                </td>
            </tr>

            <tr>
                <th>Pincode:</th>
                <td>
                    <input type="number" name="Pincode" placeholder="Enter Pincode">
                </td>
            </tr>

            <tr>
                <th>Joining date:</th>
                <td>
                    <input type="date" name="Jnd" placeholder="Enter Joining date">
                </td>
            </tr>

            <tr>
                <th>confirm your form:</th>
                <td>
                   <button>Submit</button>
                   <button>Reset</button>
                </td>
            </tr>



        </table>
    </form>
</body>
</html>
